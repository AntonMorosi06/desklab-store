<svg xmlns="http://www.w3.org/2000/svg" width="900" height="650" viewBox="0 0 900 650" role="img" aria-label="Minimal cable organizer desk accessory">
  <defs>
    <linearGradient id="bgGradientCable" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f1f3"/>
    </linearGradient>

    <linearGradient id="organizerBodyCable" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f8f9"/>
      <stop offset="45%" stop-color="#d7d7dc"/>
      <stop offset="100%" stop-color="#9d9da3"/>
