<svg xmlns="http://www.w3.org/2000/svg" width="900" height="650" viewBox="0 0 900 650" role="img" aria-label="Adjustable minimalist phone stand">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f1f3"/>
    </linearGradient>

    <linearGradient id="phoneBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#222222"/>
      <stop offset="48%" stop-color="#090909"/>
      <stop offset="100%" stop-color="#3a3a3c"/>
    </linearGradient>

    <linearGradient id="phoneScreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbfbfd"/>
      <stop offset="100%" stop-color="#e8e8ed"/>
    </linearGradient>

    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f7f8"/>
      <stop offset="45%" stop-color="#d8d8dc"/>
      <stop offset="100%" stop-color="#a9a9af"/>
    </linearGradient>

    <linearGradient id="darkMetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a3a3c"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000000" flood-opacity="0.16"/>
    </filter>

    <filter id="lightShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.10"/>
    </filter>

    <filter id="tinyShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="900" height="650" rx="44" fill="#f5f5f7"/>
  <rect x="34" y="34" width="832" height="582" rx="36" fill="url(#bgGradient)" stroke="#d8d8dc"/>

