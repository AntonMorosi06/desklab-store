<svg xmlns="http://www.w3.org/2000/svg" width="900" height="650" viewBox="0 0 900 650" role="img" aria-label="Adjustable minimalist laptop stand">
  <defs>
    <linearGradient id="bgGradientLaptop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f1f3"/>
    </linearGradient>

    <linearGradient id="laptopLidLaptop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9f9fb"/>
      <stop offset="48%" stop-color="#d7d7dc"/>
      <stop offset="100%" stop-color="#a8a8ae"/>
    </linearGradient>

    <linearGradient id="screenGlassLaptop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161618"/>
      <stop offset="55%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#2d2d30"/>
    </linearGradient>

    <linearGradient id="standMetalLaptop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f7f8"/>
      <stop offset="42%" stop-color="#d5d5da"/>
      <stop offset="100%" stop-color="#9d9da3"/>
    </linearGradient>

    <linearGradient id="darkMetalLaptop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a3a3c"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>

    <filter id="softShadowLaptop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000000" flood-opacity="0.16"/>
    </filter>

    <filter id="lightShadowLaptop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.11"/>
    </filter>

    <filter id="tinyShadowLaptop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.11"/>
    </filter>
  </defs>

