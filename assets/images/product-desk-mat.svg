<svg xmlns="http://www.w3.org/2000/svg" width="900" height="650" viewBox="0 0 900 650" role="img" aria-label="Minimal large desk mat accessory">
  <defs>
    <linearGradient id="bgGradientDeskMat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f1f3"/>
    </linearGradient>

    <linearGradient id="matSurfaceDeskMat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d2d30"/>
      <stop offset="48%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#3a3a3c"/>
    </linearGradient>

    <linearGradient id="matEdgeDeskMat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a5a60"/>
      <stop offset="50%" stop-color="#202022"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>

    <linearGradient id="deviceMetalDeskMat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f8f9"/>
      <stop offset="45%" stop-color="#d7d7dc"/>
      <stop offset="100%" stop-color="#a0a0a6"/>
    </linearGradient>

    <linearGradient id="glassDeskMat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#151517"/>
      <stop offset="55%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#2d2d30"/>
    </linearGradient>

    <pattern id="fineTextureDeskMat" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M0 6 H12" stroke="#ffffff" stroke-width="0.8" opacity="0.055"/>
      <path d="M6 0 V12" stroke="#ffffff" stroke-width="0.8" opacity="0.035"/>
    </pattern>

    <filter id="softShadowDeskMat" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000000" flood-opacity="0.16"/>
    </filter>

    <filter id="lightShadowDeskMat" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.11"/>
    </filter>

    <filter id="tinyShadowDeskMat" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.11"/>
    </filter>
  </defs>

